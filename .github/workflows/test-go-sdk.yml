name: Test Go SDK

on:
  push:
    paths:
      - 'go-sdk/**'
      - '.github/workflows/test-go-sdk.yml'
  pull_request:
    paths:
      - 'go-sdk/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true

      - name: Download dependencies
        working-directory: go-sdk
        run: go mod download

      - name: Build SDK
        working-directory: go-sdk
        run: go build ./...

      - name: Vet SDK
        working-directory: go-sdk
        run: go vet ./...

      - name: Run standard Go tests
        working-directory: go-sdk
        run: go test ./... -count=1 -v

      - name: Run integration tests (if present)
        if: ${{ hashFiles('go-sdk/test/**/*.go') != '' }}
        working-directory: go-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
          VOBIZ_FROM_NUMBER: ${{ secrets.VOBIZ_FROM_NUMBER }}
          VOBIZ_TO_NUMBER: ${{ secrets.VOBIZ_TO_NUMBER }}
          VOBIZ_TRANSFER_NUMBER: ${{ secrets.VOBIZ_TRANSFER_NUMBER }}
        run: go test ./test/... -count=1 -v
