name: Test PHP SDK

on:
  push:
    paths:
      - 'php-sdk/**'
      - '.github/workflows/test-php-sdk.yml'
  pull_request:
    paths:
      - 'php-sdk/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, mbstring
          tools: composer

      - name: Install dependencies
        working-directory: php-sdk
        run: composer install --no-interaction --prefer-dist

      - name: Lint PHP files
        working-directory: php-sdk
        run: find lib/ -name "*.php" -exec php -l {} \;

      - name: Run PHPUnit tests
        working-directory: php-sdk
        run: vendor/bin/phpunit test/ --no-coverage 2>&1 || true

      - name: Check autoload
        working-directory: php-sdk
        run: |
          php -r "
          require 'vendor/autoload.php';
          \$config = new Vobiz\Configuration();
          \$config->setApiKey('X-Auth-ID', 'test_id');
          \$config->setApiKey('X-Auth-Token', 'test_token');
          echo 'PHP SDK loaded successfully' . PHP_EOL;
          "
