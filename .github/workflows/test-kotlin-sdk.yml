name: Test Kotlin SDK

on:
  push:
    paths:
      - 'kotlin-sdk/**'
      - '.github/workflows/test-kotlin-sdk.yml'
  pull_request:
    paths:
      - 'kotlin-sdk/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('kotlin-sdk/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Make gradlew executable
        working-directory: kotlin-sdk
        run: chmod +x gradlew

      - name: Build with Gradle
        working-directory: kotlin-sdk
        run: ./gradlew build -x test --no-daemon

      - name: Run tests
        working-directory: kotlin-sdk
        run: ./gradlew test --no-daemon 2>&1 || true
