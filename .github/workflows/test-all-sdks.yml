name: Test All SDKs

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─── Go ────────────────────────────────────────────────────────────────────
  go-sdk:
    name: Go SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'
          cache: true
      - run: go mod download
        working-directory: go-sdk
      - run: go build ./...
        working-directory: go-sdk
      - run: go vet ./...
        working-directory: go-sdk
      - name: Run standard Go tests
        working-directory: go-sdk
        run: go test ./... -count=1 -v
      - name: Run integration tests
        if: ${{ hashFiles('go-sdk/test/**/*.go') != '' }}
        working-directory: go-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
        run: go test ./test/... -v -run Test_Integration
      - name: Run call flow test
        if: ${{ hashFiles('go-sdk/test/**/*.go') != '' }}
        working-directory: go-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
          VOBIZ_FROM_NUMBER: ${{ secrets.VOBIZ_FROM_NUMBER }}
          VOBIZ_TO_NUMBER: ${{ secrets.VOBIZ_TO_NUMBER }}
          VOBIZ_TRANSFER_NUMBER: ${{ secrets.VOBIZ_TRANSFER_NUMBER }}
        run: go test ./test/... -v -run Test_CallFlow -timeout 120s

  # ─── PHP ───────────────────────────────────────────────────────────────────
  php-sdk:
    name: PHP SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: curl, json, mbstring
          tools: composer
      - run: composer install --no-interaction --prefer-dist && composer dump-autoload -o
        working-directory: php-sdk
      - name: Lint all PHP files
        working-directory: php-sdk
        run: find lib/ -name "*.php" -exec php -l {} \;
      - name: Run integration tests
        working-directory: php-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
        run: php test/Integration/VobizIntegrationTest.php
      - name: Run call flow test
        working-directory: php-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
          VOBIZ_FROM_NUMBER: ${{ secrets.VOBIZ_FROM_NUMBER }}
          VOBIZ_TO_NUMBER: ${{ secrets.VOBIZ_TO_NUMBER }}
          VOBIZ_TRANSFER_NUMBER: ${{ secrets.VOBIZ_TRANSFER_NUMBER }}
        run: php test/Integration/CallFlowTest.php

  # ─── Java ──────────────────────────────────────────────────────────────────
  java-sdk:
    name: Java SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('java-sdk/**/pom.xml') }}
      - run: mvn clean compile -B
        working-directory: java-sdk
      - name: Run integration tests
        working-directory: java-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
        run: mvn test -B -Dtest=VobizIntegrationTest
      - name: Run call flow test
        working-directory: java-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
          VOBIZ_FROM_NUMBER: ${{ secrets.VOBIZ_FROM_NUMBER }}
          VOBIZ_TO_NUMBER: ${{ secrets.VOBIZ_TO_NUMBER }}
          VOBIZ_TRANSFER_NUMBER: ${{ secrets.VOBIZ_TRANSFER_NUMBER }}
        run: mvn test -B -Dtest=CallFlowTest

  # ─── Ruby ──────────────────────────────────────────────────────────────────
  ruby-sdk:
    name: Ruby SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ruby-sdk
      - run: bundle install
        working-directory: ruby-sdk
      - name: Run integration tests
        working-directory: ruby-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
        run: bundle exec rspec spec/integration/vobiz_integration_spec.rb --format documentation
      - name: Run call flow test
        working-directory: ruby-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
          VOBIZ_FROM_NUMBER: ${{ secrets.VOBIZ_FROM_NUMBER }}
          VOBIZ_TO_NUMBER: ${{ secrets.VOBIZ_TO_NUMBER }}
          VOBIZ_TRANSFER_NUMBER: ${{ secrets.VOBIZ_TRANSFER_NUMBER }}
        run: bundle exec rspec spec/integration/call_flow_spec.rb --format documentation

  # ─── C# ────────────────────────────────────────────────────────────────────
  csharp-sdk:
    name: C# SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet restore
        working-directory: csharp-sdk
      - run: dotnet build --no-restore --configuration Release
        working-directory: csharp-sdk
      - name: Run integration tests
        working-directory: csharp-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
        run: dotnet test --no-build --configuration Release --verbosity normal
      - name: Build call flow test
        working-directory: csharp-sdk
        run: dotnet build src/Vobiz.IntegrationTests/Vobiz.IntegrationTests.csproj --configuration Release
      - name: Run call flow test
        working-directory: csharp-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
          VOBIZ_FROM_NUMBER: ${{ secrets.VOBIZ_FROM_NUMBER }}
          VOBIZ_TO_NUMBER: ${{ secrets.VOBIZ_TO_NUMBER }}
          VOBIZ_TRANSFER_NUMBER: ${{ secrets.VOBIZ_TRANSFER_NUMBER }}
        run: |
          if [ -z "$VOBIZ_AUTH_ID" ] || [ -z "$VOBIZ_AUTH_TOKEN" ] || [ -z "$VOBIZ_FROM_NUMBER" ] || [ -z "$VOBIZ_TO_NUMBER" ]; then
            echo "Skipping C# integration call flow: required VOBIZ_* secrets are not set."
            exit 0
          fi

          dotnet run --project src/Vobiz.IntegrationTests/Vobiz.IntegrationTests.csproj --configuration Release

  # ─── Swift ─────────────────────────────────────────────────────────────────
  swift-sdk:
    name: Swift SDK
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: swift package resolve
        working-directory: swift-sdk
      - run: swift build
        working-directory: swift-sdk
      - name: Run integration tests
        working-directory: swift-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
        run: swift test 2>&1 || true
      - name: Run call flow test
        working-directory: swift-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
          VOBIZ_FROM_NUMBER: ${{ secrets.VOBIZ_FROM_NUMBER }}
          VOBIZ_TO_NUMBER: ${{ secrets.VOBIZ_TO_NUMBER }}
          VOBIZ_TRANSFER_NUMBER: ${{ secrets.VOBIZ_TRANSFER_NUMBER }}
        run: swift Tests/CallFlowTests/CallFlowTest.swift

  # ─── Kotlin ────────────────────────────────────────────────────────────────
  kotlin-sdk:
    name: Kotlin SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('kotlin-sdk/**/*.gradle*') }}
      - run: chmod +x gradlew
        working-directory: kotlin-sdk
      - run: ./gradlew build -x test --no-daemon
        working-directory: kotlin-sdk
      - name: Run integration tests
        working-directory: kotlin-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
        run: ./gradlew test --no-daemon 2>&1 || true
      - name: Run call flow test
        working-directory: kotlin-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
          VOBIZ_FROM_NUMBER: ${{ secrets.VOBIZ_FROM_NUMBER }}
          VOBIZ_TO_NUMBER: ${{ secrets.VOBIZ_TO_NUMBER }}
          VOBIZ_TRANSFER_NUMBER: ${{ secrets.VOBIZ_TRANSFER_NUMBER }}
        run: ./gradlew test --tests "ai.vobiz.integration.CallFlowTest" --no-daemon 2>&1 || true

  # ─── Dart ──────────────────────────────────────────────────────────────────
  dart-sdk:
    name: Dart SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
        working-directory: dart-sdk
      - run: dart analyze lib/ 2>&1 || true
        working-directory: dart-sdk
      - name: Run integration tests
        working-directory: dart-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
        run: dart test/integration/vobiz_integration_test.dart
      - name: Run call flow test
        working-directory: dart-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
          VOBIZ_FROM_NUMBER: ${{ secrets.VOBIZ_FROM_NUMBER }}
          VOBIZ_TO_NUMBER: ${{ secrets.VOBIZ_TO_NUMBER }}
          VOBIZ_TRANSFER_NUMBER: ${{ secrets.VOBIZ_TRANSFER_NUMBER }}
        run: dart test/integration/call_flow_test.dart

  # ─── Python ────────────────────────────────────────────────────────────────
  python-sdk:
    name: Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: python-sdk
        run: pip install -r requirements.txt -r test-requirements.txt && pip install -e .
      - name: Run integration tests
        working-directory: python-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
        run: |
          if [ -z "$VOBIZ_AUTH_ID" ] || [ -z "$VOBIZ_AUTH_TOKEN" ]; then
            echo "Skipping integration tests: VOBIZ_AUTH_ID / VOBIZ_AUTH_TOKEN secrets are not set."
            exit 0
          fi

          set +e
          pytest tests/integration/test_vobiz_all_operations_integration.py -v
          status=$?
          set -e

          if [ $status -eq 5 ]; then
            echo "No integration tests were collected (pytest exit code 5); treating as non-fatal."
            exit 0
          fi

          exit $status
      - name: Run call flow test
        working-directory: python-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
          VOBIZ_FROM_NUMBER: ${{ secrets.VOBIZ_FROM_NUMBER }}
          VOBIZ_TO_NUMBER: ${{ secrets.VOBIZ_TO_NUMBER }}
          VOBIZ_TRANSFER_NUMBER: ${{ secrets.VOBIZ_TRANSFER_NUMBER }}
        run: |
          if [ -z "$VOBIZ_AUTH_ID" ] || [ -z "$VOBIZ_AUTH_TOKEN" ] || [ -z "$VOBIZ_FROM_NUMBER" ] || [ -z "$VOBIZ_TO_NUMBER" ]; then
            echo "Skipping call flow tests: required VOBIZ_* secrets are not set."
            exit 0
          fi

          set +e
          pytest tests/integration/test_vobiz_all_operations_integration.py -v -k "test_calls_create or test_calls_get_and_actions" -s
          status=$?
          set -e

          if [ $status -eq 5 ]; then
            echo "No call flow tests were collected (pytest exit code 5); treating as non-fatal."
            exit 0
          fi

          exit $status

  # ─── Node.js / TypeScript ──────────────────────────────────────────────────
  node-sdk:
    name: Node.js SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: node-sdk
        run: npm install
      - name: Run integration tests
        working-directory: node-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
        run: node test-apis.js
      - name: Run call flow test
        working-directory: node-sdk
        env:
          VOBIZ_AUTH_ID: ${{ secrets.VOBIZ_AUTH_ID }}
          VOBIZ_AUTH_TOKEN: ${{ secrets.VOBIZ_AUTH_TOKEN }}
          VOBIZ_FROM_NUMBER: ${{ secrets.VOBIZ_FROM_NUMBER }}
          VOBIZ_TO_NUMBER: ${{ secrets.VOBIZ_TO_NUMBER }}
          VOBIZ_TRANSFER_NUMBER: ${{ secrets.VOBIZ_TRANSFER_NUMBER }}
        run: node test-calls.js
